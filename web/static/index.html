<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Athena-Plus - Windows AI Agent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #2d2d2d;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #404040;
        }

        .header h1 {
            font-size: 24px;
            color: #4a9eff;
        }

        .header p {
            font-size: 14px;
            color: #888;
            margin-top: 5px;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .message {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 10px;
            max-width: 80%;
        }

        .message.user {
            background: #2d2d2d;
            margin-left: auto;
            border: 1px solid #404040;
        }

        .message.assistant {
            background: #1e3a5f;
            margin-right: auto;
            border: 1px solid #2d5a8f;
        }

        .message .role {
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .message .content {
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .input-container {
            background: #2d2d2d;
            padding: 20px;
            border-top: 1px solid #404040;
        }

        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 10px;
        }

        .input-wrapper textarea {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #404040;
            color: #e0e0e0;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            resize: none;
            min-height: 50px;
            max-height: 150px;
            font-family: inherit;
        }

        .input-wrapper textarea:focus {
            outline: none;
            border-color: #4a9eff;
        }

        .input-wrapper button {
            background: #4a9eff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .input-wrapper button:hover {
            background: #3a8eef;
        }

        .input-wrapper button:disabled {
            background: #404040;
            cursor: not-allowed;
        }

        .status {
            text-align: center;
            padding: 10px;
            color: #888;
            font-size: 12px;
        }

        .typing-indicator {
            display: inline-block;
            animation: typing 1.5s infinite;
        }

        @keyframes typing {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>⚡ Athena-Plus</h1>
        <p>Windows Native AI Agent</p>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="message assistant">
            <div class="role">Athena-Plus</div>
            <div class="content">你好！我是 Athena-Plus，你的 Windows 原生 AI Agent。我可以帮你执行命令、管理文件、查询系统信息等。有什么可以帮你的吗？</div>
        </div>
    </div>

    <div class="status" id="status"></div>

    <div class="input-container">
        <div class="input-wrapper">
            <textarea id="messageInput" placeholder="输入消息... (Shift+Enter 换行，Enter 发送)" rows="1"></textarea>
            <button id="sendButton">发送</button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const status = document.getElementById('status');

        let isGenerating = false;

        // 自动调整文本框高度
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });

        // 发送消息
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || isGenerating) return;

            // 添加用户消息到界面
            addMessage('user', message);
            messageInput.value = '';
            messageInput.style.height = 'auto';

            // 禁用输入
            isGenerating = true;
            sendButton.disabled = true;
            status.textContent = '正在生成回复...';

            // 添加助手消息占位符
            const assistantMsgDiv = addMessage('assistant', '<span class="typing-indicator">思考中...</span>');

            try {
                // 调用 OpenAI 兼容接口
                const response = await fetch('/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'athena-plus',
                        messages: [
                            { role: 'user', content: message }
                        ],
                        stream: true,
                        temperature: 0.9
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let assistantResponse = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') break;

                            try {
                                const json = JSON.parse(data);
                                const content = json.choices[0]?.delta?.content || '';
                                assistantResponse += content;
                                
                                // 更新助手消息
                                assistantMsgDiv.querySelector('.content').innerHTML = 
                                    formatMessage(assistantResponse);
                                
                                // 滚动到底部
                                chatContainer.scrollTop = chatContainer.scrollHeight;
                            } catch (e) {
                                // 忽略解析错误
                            }
                        }
                    }
                }

                status.textContent = '就绪';
            } catch (error) {
                console.error('Error:', error);
                assistantMsgDiv.querySelector('.content').textContent = 
                    `错误: ${error.message}`;
                status.textContent = '错误';
            } finally {
                isGenerating = false;
                sendButton.disabled = false;
            }
        }

        // 添加消息到界面
        function addMessage(role, content) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            
            const roleDiv = document.createElement('div');
            roleDiv.className = 'role';
            roleDiv.textContent = role === 'user' ? '你' : 'Athena-Plus';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'content';
            contentDiv.innerHTML = formatMessage(content);
            
            msgDiv.appendChild(roleDiv);
            msgDiv.appendChild(contentDiv);
            
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            return msgDiv;
        }

        // 格式化消息（简单处理）
        function formatMessage(content) {
            // 转义 HTML
            let formatted = content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
            
            // 保留换行
            formatted = formatted.replace(/\n/g, '<br>');
            
            return formatted;
        }

        // 事件监听
        sendButton.addEventListener('click', sendMessage);

        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // 检查后端状态
        async function checkStatus() {
            try {
                const response = await fetch('/ping');
                if (response.ok) {
                    status.textContent = '后端已连接';
                } else {
                    status.textContent = '后端连接失败';
                }
            } catch (error) {
                status.textContent = '后端未启动';
            }
        }

        checkStatus();
    </script>
</body>
</html>
